<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나미나 | Hyundai Card</title>
<style>
  :root {
    --hyundai-blue: #002c5f;
    --accent: #ff6b35;
    --paper: #fdfcfa;
    --ink: #1a1a1a;
    --muted: #8a8580;
    --line: #ece8e2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Pretendard', -apple-system, 'Noto Sans KR', sans-serif;
    background: linear-gradient(180deg, #f3efe9 0%, #e8e2d8 100%);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 18px;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--paper);
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 24px 50px -24px rgba(0,44,95,0.25);
  }

  /* signature: oversized cursor mark / blob shapes evoking a "stamp of approval" */
  .blob {
    position: absolute;
    top: -60px;
    right: -60px;
    width: 180px;
    height: 180px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.10;
  }
  .blob2 {
    position: absolute;
    bottom: 120px;
    left: -50px;
    width: 130px;
    height: 130px;
    background: var(--hyundai-blue);
    border-radius: 50%;
    opacity: 0.06;
  }

  .header {
    padding: 28px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .brand-logo {
    font-size: 14px;
    font-weight: 800;
    color: var(--hyundai-blue);
    letter-spacing: -0.02em;
  }
  .brand-logo span { color: var(--accent); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    color: var(--hyundai-blue);
    background: rgba(0,44,95,0.06);
    padding: 6px 11px;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .badge::before { content: '✓'; color: var(--accent); font-weight: 900; }

  .identity {
    padding: 28px 28px 4px;
    position: relative;
    z-index: 2;
  }

  .greeting {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .name {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 0.05em;
    line-height: 1.1;
  }
  .name .accent-dot { color: var(--accent); }

  .role-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .tag {
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--hyundai-blue);
    color: white;
  }
  .tag.alt {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--line);
  }

  .actions {
    padding: 26px 20px 6px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    position: relative;
    z-index: 2;
  }

  .action {
    grid-column: span 2;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border-radius: 16px;
    border: 1.5px solid var(--line);
    text-decoration: none;
    color: var(--ink);
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .action.primary {
    background: var(--hyundai-blue);
    color: white;
    border-color: var(--hyundai-blue);
  }
  .action.half { grid-column: span 1; }
  .action:active { transform: scale(0.98); }

  .icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    border-radius: 10px;
    background: rgba(0,44,95,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .action.primary .icon { background: rgba(255,255,255,0.15); }
  .icon svg { width: 17px; height: 17px; stroke: var(--hyundai-blue); fill: none; }
  .action.primary .icon svg { stroke: white; }

  .action-text { flex: 1; min-width: 0; }
  .action-label {
    font-size: 10.5px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .action.primary .action-label { color: rgba(255,255,255,0.65); }
  .action-value {
    font-size: 14.5px;
    font-weight: 700;
    word-break: break-all;
  }

  .address-block {
    margin: 22px 20px 0;
    padding: 18px;
    border-radius: 16px;
    background: rgba(0,44,95,0.04);
    font-size: 12px;
    line-height: 1.85;
    color: #4a4a4a;
    position: relative;
    z-index: 2;
  }
  .address-block .addr-kr { font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .address-block .addr-en { color: var(--muted); }

  .footer {
    padding: 20px 28px 30px;
    margin-top: 18px;
    font-size: 9.5px;
    line-height: 1.8;
    color: var(--muted);
    letter-spacing: 0.04em;
    position: relative;
    z-index: 2;
  }
  .footer b { color: var(--hyundai-blue); }

  .strip {
    height: 6px;
    background: linear-gradient(90deg, var(--hyundai-blue) 0%, var(--accent) 100%);
  }
</style>
</head>
<body>

<div class="card">
  <div class="blob"></div>
  <div class="blob2"></div>

  <div class="header">
    <div class="brand-logo">현대카드<span>.</span></div>
    <div class="badge">우수인증 모집인</div>
  </div>

  <div class="identity">

    <div class="name">나미나<span class="accent-dot">.</span></div>
    <div class="role-tags">
      <div class="tag">CP · Credit Planner</div>

  </div>

  <div class="actions">

      </div>
      <div class="action-text">
        <div class="action-label">바로 전화하기</div>
        <div class="action-value">010-8668-1919</div>
      </div>
    </a>

    <a class="action half" href="tel:0639065300">
      <div class="icon">
        <svg viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
      </div>

        <div class="action-label">대표번호</div>

      </div>

    <a class="action half" href="https://map.naver.com/p/search/전라북도 전주시 기린대로 213 대우빌딩" target="_blank">
      <div class="icon">
        <svg viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="action-text">
        <div class="action-label">오시는 길</div>
        <div class="action-value">길찾기</div>
      </div>
    </a>
  </div>

  <div class="address-block">
    <div class="addr-kr">54994 전라북도 전주시 기린대로 213 대우빌딩 2층</div>
    <div class="addr-en">2F, 213, Girin-daero, Wansan-gu, Jeonju-si,<br>Jeollabuk-do, 54994, Korea</div>
    <div class="addr-en" style="margin-top:6px;">F 0505-127-0053</div>
  </div>

  <div class="footer">
    <b>모집인번호</b> 00936860 ·  <b>여신금융협회 등록번호</b> C060P000006993240008
  </div>

  <div class="strip"></div>
</div>

</body>
</html>
